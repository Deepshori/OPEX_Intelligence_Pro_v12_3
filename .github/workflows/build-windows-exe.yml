name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name "OPEX Intelligence Pro" --version-file version_info.txt --add-data "config;config" main.py

      - name: Zip dist folder
        run: |
          Compress-Archive -Path dist\* -DestinationPath OPEX_Intelligence_Pro_v12_3.zip

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPEX-Intelligence-Pro-v12-3-Windows-EXE
          path: OPEX_Intelligence_Pro_v12_3.zip
